<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarthak Sukhral — Interactive Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>

  <!-- ── In-flight HUD ───────────────────────────────────────────────── -->
  <div id="hud">
    <div id="hud-top-left">
      <div class="hud-panel" id="quest-log">
        <div class="quest-head">
          <span class="hud-label">OBJECTIVES</span>
          <span id="quest-count">0/0</span>
        </div>
        <div id="quest-bar"><div id="quest-bar-fill"></div></div>
        <div id="quest-items"></div>
      </div>
    </div>

    <div id="scan-prompt"><kbd>E</kbd><span>SCAN <b class="scan-target"></b></span></div>

    <!-- Easter-egg reveal — hidden until all objectives are complete -->
    <div id="secret-hint"><kbd>P</kbd><span>SECRET UNLOCKED · toggle PIXEL MODE</span></div>
  </div>

  <!-- ── Scan dossier (Mass Effect style) ────────────────────────────── -->
  <div id="info-panel" class="hidden">
    <div id="panel-designation"></div>
    <div id="panel-tab"><span id="panel-badge"></span></div>
    <div id="panel-body"></div>
    <div id="panel-footer"><span class="footer-dot"></span> SCAN COMPLETE</div>
    <button id="panel-close">CLOSE</button>
  </div>

  <!-- ── Loading screen (shown after ENTER until all assets are ready) ──── -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="loading-title">LOADING</div>
      <div id="loading-bar"><div id="loading-bar-fill"></div></div>
      <div class="loading-row">
        <span id="loading-pct">0%</span>
      </div>
    </div>
  </div>

  <!-- ── Landing ─────────────────────────────────────────────────────── -->
  <div id="landing">
    <canvas id="galaxy-canvas"></canvas>
    <div id="landing-vignette"></div>
    <div id="landing-content">
      <div id="landing-card">
        <h1 id="landing-title">Sarthak Sukhral</h1>
        <p class="landing-tagline">An Interactive Interstellar Portfolio</p>
        <div class="landing-controls">
          <span><kbd>DRAG</kbd> orbit view</span>
          <span><kbd>CLICK</kbd> a label to travel</span>
          <span><kbd>TAB</kbd> pilot the ship</span>
          <span><kbd>WASD</kbd> fly · <kbd>A</kbd><kbd>D</kbd> turn</span>
          <span><kbd>SPACE</kbd>/<kbd>CTRL</kbd> up / down</span>
          <span><kbd>SHIFT</kbd>+<kbd>W</kbd> boost</span>
          <span><kbd>E</kbd> scan a world</span>
          <span><kbd>R</kbd> reset view</span>
        </div>
        <button id="enter-btn"><span>ENTER</span></button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
