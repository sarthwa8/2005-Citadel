<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarthak Sukhral — Interactive Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>

  <!-- ── In-flight HUD ───────────────────────────────────────────────── -->
  <div id="hud">
    <div id="hud-top-left">
      <div class="hud-panel" id="quest-log">
        <div class="quest-head">
          <span class="hud-label">OBJECTIVES</span>
          <span id="quest-count">0/0</span>
        </div>
        <div id="quest-bar"><div id="quest-bar-fill"></div></div>
        <div id="quest-items"></div>
      </div>
    </div>

    <div id="scan-prompt"><kbd>E</kbd><span>SCAN <b class="scan-target"></b></span></div>

    <!-- Easter-egg reveal — hidden until all objectives are complete -->
    <div id="secret-hint"><kbd>P</kbd><span>SECRET UNLOCKED · toggle PIXEL MODE</span></div>
  </div>

  <!-- ── Scan dossier (Mass Effect style) ────────────────────────────── -->
  <div id="info-panel" class="hidden">
    <div id="panel-designation"></div>
    <div id="panel-tab"><span id="panel-badge"></span></div>
    <div id="panel-body"></div>
    <div id="panel-footer"><span class="footer-dot"></span> SCAN COMPLETE</div>
    <button id="panel-close">CLOSE</button>
  </div>

  <!-- ── Cinematic warp-in title (fades in over the live fly-in) ───────── -->
  <div id="intro-title">
    <h1 id="intro-name">Sarthak Sukhral</h1>
    <p id="intro-tag">Creative Developer &amp; Researcher</p>
  </div>

  <!-- ── Onboarding tip — fading instructions after you enter the scene ── -->
  <div id="tip"></div>

  <!-- ── Controls hint (persistent reference at the bottom) ───────────── -->
  <div id="controls-hint">
    <kbd>DRAG</kbd> rotate <span>·</span> <kbd>SCROLL</kbd> zoom <span>·</span>
    <kbd>WASD</kbd> fly <span>·</span> <kbd>SHIFT</kbd> boost <span>·</span>
    <kbd>E</kbd> scan <span>·</span> <kbd>TAB</kbd> view <span>·</span> <kbd>R</kbd> reset
  </div>

  <!-- ── Landing (minimal launch gate over the dimmed live system) ─────── -->
  <div id="landing">
    <div id="landing-vignette"></div>
    <div id="landing-content">
      <h1 id="landing-title">Sarthak Sukhral</h1>
      <p class="landing-tagline">Creative Developer &amp; Researcher</p>
      <button id="enter-btn"><span>ENTER SYSTEM</span></button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
